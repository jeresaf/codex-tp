version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: trading_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.3
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  identity-service:
    build: ./apps/identity-service
    ports: ["8001:8000"]
    depends_on: [postgres]

  market-registry-service:
    build: ./apps/market-registry-service
    ports: ["8002:8000"]
    depends_on: [postgres]

  instrument-master-service:
    build: ./apps/instrument-master-service
    ports: ["8003:8000"]
    depends_on: [postgres]

  strategy-service:
    build: ./apps/strategy-service
    ports: ["8004:8000"]
    depends_on: [postgres]

  order-service:
    build: ./apps/order-service
    ports: ["8005:8000"]
    depends_on: [postgres, redpanda]

  risk-service:
    build: ./apps/risk-service
    ports: ["8006:8000"]
    depends_on: [postgres]

  execution-service:
    build: ./apps/execution-service
    ports: ["8007:8000"]
    depends_on: [postgres]

  position-service:
    build: ./apps/position-service
    ports: ["8008:8000"]
    depends_on: [postgres]

  audit-service:
    build: ./apps/audit-service
    ports: ["8009:8000"]
    depends_on: [postgres]

  broker-adapter-simulator:
    build: ./apps/broker-adapter-simulator
    ports: ["8010:8000"]

  web-admin:
    build: ./apps/web-admin
    ports: ["3000:3000"]

  web-ops:
    build: ./apps/web-ops
    ports: ["3001:3000"]


  strategy-runtime-service:
    build: ./apps/strategy-runtime-service
    ports: ["8011:8000"]
    depends_on: [postgres]

  signal-service:
    build: ./apps/signal-service
    ports: ["8012:8000"]
    depends_on: [postgres]

  portfolio-service:
    build: ./apps/portfolio-service
    ports: ["8013:8000"]
    depends_on: [postgres]


  market-data-service:
    build: ./apps/market-data-service
    ports: ["8014:8000"]
    depends_on: [postgres]

  feature-service:
    build: ./apps/feature-service
    ports: ["8015:8000"]
    depends_on: [postgres]

  dataset-service:
    build: ./apps/dataset-service
    ports: ["8016:8000"]
    depends_on: [postgres]

  replay-service:
    build: ./apps/replay-service
    ports: ["8017:8000"]
    depends_on: [postgres]


  reconciliation-service:
    build: ./apps/reconciliation-service
    ports: ["8018:8000"]
    depends_on: [postgres]


  workflow-service:
    build: ./apps/workflow-service
    ports: ["8019:8000"]
    depends_on: [postgres]

  compliance-service:
    build: ./apps/compliance-service
    ports: ["8020:8000"]
    depends_on: [postgres]
